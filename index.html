<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Memento — Upload Photo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #0d0d0d;
      color: #f0f0f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }

    .header {
      text-align: center;
      margin-bottom: 36px;
    }

    .header h1 {
      font-size: 24px;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: #fff;
    }

    .header p {
      font-size: 14px;
      color: #888;
      margin-top: 6px;
    }

    .upload-box {
      width: 100%;
      max-width: 420px;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 20px;
      padding: 28px 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .preview-area {
      width: 100%;
      aspect-ratio: 1;
      border-radius: 14px;
      background: #111;
      border: 2px dashed #333;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    .preview-area img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 12px;
    }

    .preview-placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      color: #555;
    }

    .preview-placeholder svg {
      width: 48px;
      height: 48px;
    }

    .preview-placeholder span {
      font-size: 13px;
    }

    input[type="file"] { display: none; }

    .btn {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: none;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .btn:active { opacity: 0.8; }

    .btn-select {
      background: #1e1e1e;
      border: 1px solid #333;
      color: #fff;
    }

    .btn-upload {
      background: #C9A84C;
      color: #000;
    }

    .btn-upload:disabled {
      background: #333;
      color: #666;
      cursor: not-allowed;
    }

    .status {
      text-align: center;
      font-size: 14px;
      min-height: 20px;
      color: #888;
    }

    .status.success { color: #4ade80; }
    .status.error { color: #f87171; }

    .success-check {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      padding: 20px 0;
      text-align: center;
      width: 100%;
      max-width: 420px;
    }

    .success-check svg {
      width: 56px;
      height: 56px;
      color: #4ade80;
    }

    .success-check h2 {
      font-size: 18px;
      color: #fff;
    }

    .success-check p {
      font-size: 13px;
      color: #888;
    }

    .btn-another {
      background: #1e1e1e;
      border: 1px solid #333;
      color: #fff;
    }
  </style>
</head>
<body>

  <div class="header">
    <h1>Memento</h1>
    <p>Upload a photo to your journal</p>
  </div>

  <div class="upload-box" id="uploadBox">
    <div class="preview-area" id="previewArea">
      <div class="preview-placeholder" id="placeholder">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="3" y="3" width="18" height="18" rx="2"/>
          <circle cx="8.5" cy="8.5" r="1.5"/>
          <polyline points="21 15 16 10 5 21"/>
        </svg>
        <span>No photo selected</span>
      </div>
      <img id="previewImg" style="display:none" />
    </div>

    <input type="file" id="fileInput" accept="image/*" capture="environment" />
    <input type="file" id="galleryInput" accept="image/*" />

    <div style="display:flex; gap:10px;">
      <button class="btn btn-select" id="selectBtn" style="flex:1">
        📷 Take Photo
      </button>
      <button class="btn btn-select" id="galleryBtn" style="flex:1">
        🖼️ Choose from Gallery
      </button>
    </div>

    <button class="btn btn-upload" id="uploadBtn" disabled>
      Upload to Memento
    </button>

    <div class="status" id="status"></div>
  </div>

  <div class="success-check" id="successBox" style="width:100%;max-width:420px;">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M22 11.08V12a10 10 0 11-5.93-9.14"/>
      <polyline points="22 4 12 14.01 9 11.01"/>
    </svg>
    <h2>Photo Uploaded!</h2>
    <p>It will appear in Memento shortly.</p>
    <button class="btn btn-another" id="anotherBtn">Upload Another</button>
  </div>

  <script src="upload.js"></script>
</body>
</html>
